<!DOCTYPE html>
<html lang="en" dir="ltr ">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Duan Wang">
    <meta name="description" content="My web project">
    <meta name="keyword" content="html, css, web, seo, web development, JS">
    <title>Jobfinder</title>
    <link rel="icon" href="./assets/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mrspecht/cdn/reset.css" media="all">
    <link rel="stylesheet" href="./assets/css/style.css" media="all">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" >
    <script type="module" src="./assets/js/index.js"></script>
  </head>
  <body>
    <div class="login-page">
        <div class="login-form-container">
            <h2>Login to Job Finder</h2>
            <form class="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" class="username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" class="password" required placeholder="Enter your password">
                </div>
                <button class="submit" type="button">Login</button>
                <p class="error-message"></p>
                <p class="register-link">
                    Don't have an account? <a href=" ">Register here</a>
                </p>
            </form>
        </div>

        <div class="login-image">
          <img src="./assets/img/hireemployee.png" alt="Job Finder">
        </div>
    </div>
  </body>
</html>
